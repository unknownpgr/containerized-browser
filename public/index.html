<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>containerized-browser · live</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #0b0e14; color: #c9d1d9;
    font: 13px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; }
  body { display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: .6rem; padding: .5rem .8rem;
    background: #11151f; border-bottom: 1px solid #1e2433; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #f85149; transition: background .3s; }
  .dot.live { background: #3fb950; box-shadow: 0 0 8px #3fb95088; }
  .title { font-weight: 600; color: #e6edf3; }
  .meta { margin-left: auto; opacity: .6; }
  main { flex: 1; display: grid; place-items: center; overflow: hidden; padding: .8rem; }
  #screen { max-width: 100%; max-height: 100%; border: 1px solid #1e2433;
    border-radius: 6px; box-shadow: 0 8px 40px #0006; background: #000; }
  #empty { opacity: .45; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <span class="title">containerized-browser</span>
    <span id="status">connecting…</span>
    <span class="meta" id="fps"></span>
  </header>
  <main>
    <img id="screen" alt="" hidden />
    <div id="empty">waiting for first frame…</div>
  </main>
<script>
(() => {
  const dot = document.getElementById('dot');
  const status = document.getElementById('status');
  const fpsEl = document.getElementById('fps');
  const img = document.getElementById('screen');
  const empty = document.getElementById('empty');

  let frames = 0;
  setInterval(() => { fpsEl.textContent = frames + ' fps'; frames = 0; }, 1000);

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/stream`);

    ws.onopen = () => { dot.classList.add('live'); status.textContent = 'live'; };
    ws.onmessage = (ev) => {
      frames++;
      img.src = 'data:image/jpeg;base64,' + ev.data;
      if (img.hidden) { img.hidden = false; empty.hidden = true; }
    };
    const drop = () => {
      dot.classList.remove('live');
      status.textContent = 'reconnecting…';
      setTimeout(connect, 1000);
    };
    ws.onclose = drop;
    ws.onerror = () => ws.close();
  }
  connect();
})();
</script>
</body>
</html>
